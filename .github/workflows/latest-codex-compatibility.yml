        run: |
          CAPTURE_FILE="$RUNNER_TEMP/codex-lifecycle.jsonl"
          PORT_FILE="$RUNNER_TEMP/codex-lifecycle.port"
          python3 tests/mock_responses_server.py --capture-file "$CAPTURE_FILE" --port-file "$PORT_FILE" &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          for _ in {1..100}; do
            test -s "$PORT_FILE" && break
            sleep 0.1
          done
          test -s "$PORT_FILE"
          BASE_URL="http://127.0.0.1:$(tr -d '\r\n' < "$PORT_FILE")/v1"
          # WHY: codex exec can wait on inherited non-TTY CI stdin even when
          # the prompt is positional, so every lifecycle call gets explicit EOF.
          codex exec --ephemeral --skip-git-repo-check --dangerously-bypass-hook-trust -c 'model_provider="route09"' -c 'model_providers.route09.name="Route09 local"' -c "model_providers.route09.base_url=\"$BASE_URL\"" -c 'model_providers.route09.wire_api="responses"' -c 'model_providers.route09.requires_openai_auth=false' -c 'model_providers.route09.supports_websockets=false' "Rewrite this README title so it is clear and searchable." </dev/null
          codex exec --ephemeral --skip-git-repo-check --dangerously-bypass-hook-trust -c 'model_provider="route09"' -c 'model_providers.route09.name="Route09 local"' -c "model_providers.route09.base_url=\"$BASE_URL\"" -c 'model_providers.route09.wire_api="responses"' -c 'model_providers.route09.requires_openai_auth=false' -c 'model_providers.route09.supports_websockets=false' "Update the README parser implementation and rerun unit tests." </dev/null
          python3 tests/assert_lifecycle_capture.py --capture-file "$CAPTURE_FILE" --request-index 0 --expect active
          python3 tests/assert_lifecycle_capture.py --capture-file "$CAPTURE_FILE" --request-index 1 --expect silent
      - name: Run package regression tests
        run: |
          python3 -m unittest discover -s tests -v
          python3 plugins/outward-copy-quality-gate/scripts/validate_package.py

  report-compatibility-status:
    needs:
      - latest-codex
      - macos-arm-observation
      - macos-intel-observation
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Keep one visible compatibility issue in sync
        uses: actions/github-script@v9
        env:
          SUPPORTED_RESULT: ${{ needs.latest-codex.result }}
          ARM_JOB_RESULT: ${{ needs.macos-arm-observation.result }}
          ARM_LIFECYCLE_RESULT: ${{ needs.macos-arm-observation.outputs.lifecycle-result }}
          INTEL_JOB_RESULT: ${{ needs.macos-intel-observation.result }}
          INTEL_LIFECYCLE_RESULT: ${{ needs.macos-intel-observation.outputs.lifecycle-result }}
        with:
          github-token: ${{ github.token }}
          script: |
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100,
            });

            async function syncIssue(title, result, body, aliases = []) {
              if (result !== "failure" && result !== "success") {
                core.info(`No issue change for ${title}: ${result}`);
                return;
              }
              const acceptedTitles = new Set([title, ...aliases]);
              const existing = issues.find(
                (issue) => acceptedTitles.has(issue.title) && !issue.pull_request,
              );
              if (result === "success") {
                if (existing && (existing.state === "open" || existing.title !== title)) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: existing.number,
                    title,
                    state: "closed",
                  });
                }
                return;
              }
              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  title,
                  state: "open",
                  body,
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                });
              }
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const supportedResult =
              process.env.SUPPORTED_RESULT === "success" &&
              process.env.ARM_JOB_RESULT === "success" &&
              process.env.INTEL_JOB_RESULT === "success"
                ? "success"
                : "failure";
            const supportedBody = [
              "The newest Codex release failed a supported lifecycle or installed-hook contract check.",
              "",
              `Latest failed run: ${runUrl}`,
              "",
              "The hook is designed to fail open so Codex work can continue while compatibility is repaired.",
            ].join("\n");
            await syncIssue(
              "Latest Codex compatibility check failed",
              supportedResult,
              supportedBody,
            );

            const macLifecycleOutcomes = [
              process.env.ARM_LIFECYCLE_RESULT,
              process.env.INTEL_LIFECYCLE_RESULT,
            ];
            const macLifecycleResult = macLifecycleOutcomes.every(
              (result) => result === "success",
            )
              ? "success"
              : macLifecycleOutcomes.some((result) => result === "failure")
                ? "failure"
                : "unknown";
            const macBody = [
              "Latest Codex still exits before the local full-lifecycle proof completes on at least one hosted Mac architecture.",
              "",
              `Latest probe: ${runUrl}`,
              `macOS 15 ARM outcome: ${process.env.ARM_LIFECYCLE_RESULT}`,
              `macOS 15 Intel outcome: ${process.env.INTEL_LIFECYCLE_RESULT}`,
              "",
              "Both installed Mac hook contracts and package suites are required separately. This issue stays open until both full Mac lifecycles pass.",
            ].join("\n");
            await syncIssue(
              "macOS Codex lifecycle compatibility gap",
              macLifecycleResult,
              macBody,
              ["Apple Silicon Codex lifecycle compatibility gap"],
            );
